{% extends 'base.html' %}
{% block content %}
<div class="chat-layout {% if theme == 'salary' %}theme-salary{% elif theme == 'absence' %}theme-absence{% elif theme == 'entry' %}theme-entry{% endif %}">
    <aside class="chat-sidebar">
        <div class="sidebar-top">
            <h3>{{ title }}</h3>
            <a class="new-chat-link" href="{{ request.path }}?chat_id={{ new_chat_id }}">新增對話</a>
        </div>
        <div class="history-list">
            {% for item in history %}
                <a class="history-item {% if item.chat_id == chat_id %}active{% endif %}" href="{{ request.path }}?chat_id={{ item.chat_id }}">
                    <span>{{ item.label }}</span>
                </a>
            {% endfor %}
        </div>
    </aside>

    <div class="chat-shell">
        <div class="chat-header">
            <span>{{ title }}</span>
        </div>
        <div class="chat-body">
            {% if messages %}
                {% for msg in messages %}
                    <div class="message {{ msg.role }}">
                        <div class="bubble">{{ msg.content }}</div>
                    </div>
                {% endfor %}
            {% else %}
                <div class="empty">您好，這是{{ title }}專區，請直接輸入您的問題。</div>
            {% endif %}
        </div>

        <form method="post" class="chat-form">
            {% csrf_token %}
            <input type="hidden" name="chat_id" value="{{ chat_id }}">
            <input type="text" name="question" placeholder="輸入你的問題..." required>
            <button type="submit">送出</button>
        </form>
    </div>
</div>
{% endblock %}
